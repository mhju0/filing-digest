name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff==0.15.21
      - name: Lint
        run: ruff check .
      - name: Offline test suite
        # test_smoke.py needs the live Docker Postgres (host port 5433);
        # everything else runs DB-less and network-less by design.
        run: python -m pytest -q --ignore=tests/test_smoke.py
