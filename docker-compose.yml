# filing-digest 로컬 개발 스택 (Compose Spec v2 스타일 - 최상위 `version:` 키는 사용하지 않음)
#
# 개발 정본: `docker compose up -d db` (DB만) + host uvicorn `--reload --port 8001`.
#   backend 서비스는 profile "container"에 격리되어 bare `up`으로는 뜨지 않는다 (아래 backend.profiles 참고).
#   컨테이너로 backend를 띄우려면 명시적으로: `docker compose --profile container up backend`
# 포트: backend 8001(host, 컨테이너 사용 시), postgres 5433(host) -> 5432(내부)

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      # 아래 기본값(filing_digest / filing_digest_dev / filing_digest)은 "로컬 개발 전용" 기본값이며
      # 운영(production) 비밀번호가 아니다. 운영 환경에서는 반드시 호스트 환경변수로 덮어쓸 것.
      POSTGRES_USER: ${POSTGRES_USER:-filing_digest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filing_digest_dev}
      POSTGRES_DB: ${POSTGRES_DB:-filing_digest}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 최초 기동 시(빈 데이터 디렉토리일 때만) 스키마 초기화. Alembic 미사용 - docs/ARCHITECTURE.md 참고.
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # $$ 는 compose 치환을 피하고 컨테이너 내부 셸에서 환경변수를 읽기 위한 이스케이프.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    # 개발 정본은 host uvicorn(:8001)이다. backend 컨테이너는 KURE 캐시가 없어 stale/warmup 실패하고,
    # host uvicorn과 8001을 동시에 물면 포트 충돌(IPv6 * vs 127.0.0.1)을 일으킨다.
    # profile "container"로 격리하여 bare `docker compose up`에서 자동 기동되지 않게 한다.
    # 컨테이너 실행이 필요할 때만: `docker compose --profile container up backend`
    profiles: ["container"]
    ports:
      - "8001:8000"
    environment:
      # db 서비스명을 호스트로 사용 (compose 내부 네트워크). 기본값 미변경 시:
      # postgresql+psycopg://filing_digest:filing_digest_dev@db:5432/filing_digest
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-filing_digest}:${POSTGRES_PASSWORD:-filing_digest_dev}@db:5432/${POSTGRES_DB:-filing_digest}
      # 비밀값은 파일에 하드코딩하지 않는다. 호스트 환경변수에서 치환 주입 (미설정 시 빈 값).
      DART_API_KEY: ${DART_API_KEY:-}
      DART_BASE_URL: ${DART_BASE_URL:-https://opendart.fss.or.kr/api}
      SEC_BASE_URL: ${SEC_BASE_URL:-https://data.sec.gov}
      # SEC는 연락처가 포함된 User-Agent를 요구한다. 아래 기본값은 placeholder이며 실제 연락처로 덮어쓸 것.
      SEC_USER_AGENT: ${SEC_USER_AGENT:-filing-digest/0.1.0 your-contact@example.com}
      # 예약값(아직 미소비): 실제 차원은 backend/db/init.sql의 vector(1024)이 단일 소스. Phase 2에서 배선.
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: