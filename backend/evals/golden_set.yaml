# Offline eval golden set for filing-digest.
#
# Corpus assumption (per project owner): Samsung Electronics has 1 DART filing
# (2023 annual report), Apple has 3 SEC filings (FY2023/24/25 10-K), and
# Microsoft has 3 SEC filings (FY2023/24/25 10-K). run_eval.py resolves each
# company_slug to a live company_id via GET /companies?q=<name> at run time --
# there is no fixed company_id constant in the codebase.
#
# expected_filing_hint caveat: POST /search's SearchHit has no period/fiscal
# year field, only filing_id. run_eval.py resolves filing_id -> fiscal year by
# calling POST /answer once per company (with no `period` filter, which
# returns figures for every ingested period) and caching filing_id -> "FYxxxx"
# from the figures list. For same-company filings whose prose is very similar
# year over year, pure semantic search may not sharply separate fiscal years,
# so a miss on expected_filing_hint is informative but not necessarily a bug --
# see README.md.
#
# Judgment philosophy (2026-07-09): a live full-tier run showed narrative_status
# is non-deterministic across identical-shape numeric queries (the same query
# class landed on ok/blocked/no_results across different runs -- see
# reports/eval_20260709T092340Z.json, 7/14 passed). expected_states is
# therefore an ALLOWED SET, not a single value: any state in the list is a
# pass. For numeric-metric queries the real, deterministic contract is that
# the figures array (pulled straight from `financials`, never through the
# LLM) always contains the queried metric/period row -- expected_figure
# checks that directly, independent of which narrative_status the LLM
# happened to produce.
#
# Fields: id, query, company_slug (삼성전자|apple|msft), tier (retrieval|full),
# expected_states (full only: list of ok|blocked|no_results, any match
# passes), expected_figure (full only, optional: {metric, period} -- asserts
# that metric/period row is present in the /answer response's figures
# array), expected_filing_hint (retrieval only, nullable, e.g. "FY2024"),
# notes.

- id: ok-apple-revenue-fy2025-en
  query: "What was Apple's total revenue in fiscal year 2025?"
  company_slug: apple
  tier: full
  expected_states: [ok, blocked, no_results]
  expected_figure: {metric: revenue, period: "2025-annual"}
  expected_filing_hint: null
  notes: "state는 LLM 비결정적 -- 실질 계약은 figures 존재 (2026-07-09 실측: 5건이 no_results/blocked로 분산, reports/eval_20260709T092340Z.json)."

