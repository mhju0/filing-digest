- id: blocked-msft-opex-en
  query: "Tell me about Microsoft's operating expenses and cost structure."
  company_slug: msft
  tier: full
  expected_states: [blocked, ok]
  expected_filing_hint: null
  notes: >
    Operating expenses is outside the 5 tracked MetricKey figures
    (revenue/operating_income/net_income/eps/operating_margin). This expected
    value is a snapshot of CURRENT live behavior: the LLM attempts to narrate
    an unbacked number, which trips app.llm.number_guard
    (NumberInNarrativeError -> narrative_status=blocked, see
    backend/app/api/routes.py:402-417). It is not a designed topic filter, so
    if narrative phrasing changes this may legitimately shift to ok or
    no_results. When ok, the existing groundedness check (citations>=1)
    applies -- LLM이 숫자 회피 시 ok가 정당 (2026-07-09 실측: apple-rnd-ko가
    ok, 4 segments, reports/eval_20260709T092340Z.json).

